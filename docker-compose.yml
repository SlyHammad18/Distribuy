      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ecommerce-network:
    driver: bridge

volumes:
  user-db-primary:
  user-db-replica:
  order-db-primary:
  order-db-replica:
  inventory-db-primary:
  inventory-db-replica:
  mongodb-primary:
  mongodb-secondary:
