services:
  # ===============================
  # USER SERVICE - PostgreSQL
  # ===============================
  user-db-primary:
    image: postgres:15-alpine
    container_name: user-db-primary
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: user_service_db
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_INITDB_ARGS: "--auth-host=trust --auth-local=trust"
    ports:
      - "15432:5432"
    volumes:
      - ./db/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./db/postgres/replication-auth.sh:/docker-entrypoint-initdb.d/00-replication-auth.sh
      - ./db/postgres/user-db-scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/postgres/user-db-scripts/procedures.sql:/docker-entrypoint-initdb.d/02-procedures.sql
      - ./volumes/user-db-primary:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "hot_standby=on"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-db-replica:
    image: postgres:15-alpine
    container_name: user-db-replica
    depends_on:
      user-db-primary:
        condition: service_healthy
    environment:
      PGUSER: ${DB_USER:-postgres}
      PGPASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "15433:5432"
    volumes:
      - ./volumes/user-db-replica:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    command: |
      bash -c "rm -rf /var/lib/postgresql/data/* && chown -R postgres:postgres /var/lib/postgresql/data && until gosu postgres pg_basebackup -h user-db-primary -D /var/lib/postgresql/data -U postgres -v -w -P -X stream -R;
      do echo 'Waiting for primary to connect...'; sleep 1; done && chown -R postgres:postgres /var/lib/postgresql/data && chmod 700 /var/lib/postgresql/data && exec gosu postgres postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

