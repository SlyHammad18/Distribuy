  # ===============================
  # PRODUCT CATALOG - MongoDB
  # ===============================
  mongodb-primary:
    image: mongo:7.0
    container_name: mongodb-primary
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin}
      MONGO_INITDB_DATABASE: product_catalog_db
    ports:
      - "37017:27017"
    volumes:
      - ./db/mongo/init.js:/docker-entrypoint-initdb.d/init.js
      - mongodb-primary:/data/db
    networks:
      - ecommerce-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb-secondary:
    image: mongo:7.0
    container_name: mongodb-secondary
    depends_on:
      mongodb-primary:
        condition: service_healthy
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin}
    ports:
      - "37018:27017"
    volumes:
      - mongodb-secondary:/data/db
    networks:
      - ecommerce-network
    healthcheck:
