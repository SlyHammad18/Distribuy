<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Distribuy</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <a href="/">Distribuy</a>
            </div>
            <ul class="navbar-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/#products">Products</a></li>
                <li><a href="/cart.html">Cart</a></li>
                <li id="user-nav">
                    <a href="/profile.html" class="active">Profile</a>
                    <a href="#" onclick="logout()">Logout</a>
                </li>
                <li id="admin-nav" style="display: none;">
                    <a href="/admin.html">Admin Panel</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="profile-container">
        <div class="profile-header">
            <h1 id="profile-name">User Profile</h1>
            <p id="profile-email" class="profile-email"></p>
        </div>

        <div class="admin-tabs" style="margin-bottom: 1.2rem;">
            <a href="#profile-info" class="admin-tab active" onclick="switchTab(event, 'profile-info')">Profile Information</a>
            <a href="#my-orders" class="admin-tab" onclick="switchTab(event, 'my-orders')">My Orders</a>
        </div>

        <div id="profile-info" class="admin-content active">
            <div class="form-container" style="background: var(--light-gray);">
                <h2 style="margin-bottom: 2rem;">Edit Profile</h2>
                <form id="profile-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name">
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" name="phone">
                    </div>

                    <div class="form-group">
                        <label for="address">Address</label>
                        <textarea id="address" name="address"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" name="city">
                    </div>

                    <div class="form-group">
                        <label for="state">State</label>
                        <input type="text" id="state" name="state">
                    </div>

                    <div class="form-group">
                        <label for="zip_code">Zip Code</label>
                        <input type="text" id="zip_code" name="zip_code">
                    </div>

                    <div class="form-group">
                        <label for="country">Country</label>
                        <input type="text" id="country" name="country">
                    </div>

                    <button type="submit" class="form-submit">Save Changes</button>
                </form>
            </div>
        </div>

        <div id="my-orders" class="admin-content">
            <div style="background: var(--light-gray); padding: 2rem;">
                <h2 style="margin-bottom: 2rem;">My Orders</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="orders-tbody">
                        <tr><td colspan="5" style="text-align: center; padding: 2rem;">Loading orders...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/assets/js/common.js"></script>
    <script>
        async function loadProfile() {
            try {
                const result = await apiCall('GET', '/users/profile');

                if (result.status === 'success') {
                    const data = result.data;
                    document.getElementById('profile-name').textContent = data.name || 'User Profile';
                    document.getElementById('profile-email').textContent = data.email;
                    setUserInfo({
                        user_id: data.user_id,
                        email: data.email,
                        is_admin: !!data.is_admin
                    });

                    // Fill form fields
                    document.getElementById('name').value = data.name || '';
                    document.getElementById('phone').value = data.phone || '';
                    document.getElementById('address').value = data.address || '';
                    document.getElementById('city').value = data.city || '';
                    document.getElementById('state').value = data.state || '';
                    document.getElementById('zip_code').value = data.zip_code || '';
                    document.getElementById('country').value = data.country || '';
                } else {
                    showAlert(result.error || 'Failed to load profile', 'error');
                }
            } catch (error) {
                showAlert(error.message, 'error');
            }
        }

        async function loadOrders() {
            const user = getUserInfo();
            if (!user.user_id) {
                window.location.href = '/login.html';
                return;
            }

            try {
                const result = await apiCall('GET', `/orders/user/${user.user_id}`);

                if (result.status === 'success') {
                    const tbody = document.getElementById('orders-tbody');
                    const orders = result.data.orders;

                    if (orders.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 2rem;">No orders yet</td></tr>';
                    } else {
                        tbody.innerHTML = orders.map(order => `
                            <tr>
                                <td>#${order.order_id}</td>
                                <td>${formatCurrency(order.total_price)}</td>
                                <td>${order.status}</td>
                                <td>${formatDate(order.created_at)}</td>
                                <td><a href="/order.html?id=${order.order_id}" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.9rem;">View</a></td>
                            </tr>
                        `).join('');
                    }
                }
            } catch (error) {
                showAlert(error.message, 'error');
            }
        }

        function switchTab(evt, tabName) {
            // Hide all tabs
            document.querySelectorAll('.admin-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.admin-tab').forEach(tab => tab.classList.remove('active'));

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            if (evt && evt.target) evt.target.classList.add('active');

            if (tabName === 'my-orders') {
                loadOrders();
            }
        }

        document.getElementById('profile-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                zip_code: document.getElementById('zip_code').value,
                country: document.getElementById('country').value
            };

            try {
                const result = await apiCall('PUT', '/users/profile', formData);

                if (result.status === 'success') {
                    showAlert('Profile updated successfully!', 'success');
                } else {
                    showAlert(result.error || 'Failed to update profile', 'error');
                }
            } catch (error) {
                showAlert(error.message, 'error');
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            updateNav();
            const token = getToken();
            if (!token) {
                window.location.href = '/login.html';
                return;
            }
            loadProfile();
        });
    </script>
</body>
</html>
