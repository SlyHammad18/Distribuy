<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Distribuy</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <a href="/">Distribuy</a>
            </div>
            <ul class="navbar-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/#products">Products</a></li>
                <li><a href="/cart.html">Cart</a></li>
                <li id="auth-nav">
                    <a href="/login.html">Login</a>
                </li>
                <li id="user-nav" style="display: none;">
                    <a href="/profile.html">Profile</a>
                    <a href="#" onclick="logout()">Logout</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container" style="max-width: 900px; margin: 3rem auto; padding: 0 2rem;">
        <div id="product-detail" style="display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start;">
            <!-- Product details will be loaded here -->
        </div>
    </div>

    <section style="background-color: var(--light-gray); padding: 3rem; margin: 3rem 0;">
        <div class="container">
            <h3>Related Products</h3>
            <div class="products-grid" id="related-products" style="margin-top: 2rem;">
                <!-- Related products will be loaded here -->
            </div>
        </div>
    </section>

    <script src="/assets/js/common.js"></script>
    <script>
        async function loadProductDetails() {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');

            if (!productId) {
                window.location.href = '/';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/products/${productId}`);
                const result = await response.json();

                if (result.status === 'success') {
                    displayProductDetail(result.data);
                    loadRelatedProducts(result.data.category, productId);
                } else {
                    showAlert('Product not found', 'error');
                    setTimeout(() => window.location.href = '/', 2000);
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Error loading product', 'error');
            }
        }

        function displayProductDetail(product) {
            const container = document.getElementById('product-detail');
            const inventory = product.inventory || {};

            container.innerHTML = `
                <div>
                    <div class="product-image" style="width: 100%; height: 400px; font-size: 8rem;">
                        📦
                    </div>
                </div>
                <div>
                    <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">${product.name}</h1>
                    <p style="color: var(--text-light); font-size: 1.1rem; margin-bottom: 1.5rem;">${product.description}</p>
                    
                    <div style="display: flex; gap: 2rem; margin: 2rem 0; border-top: 2px solid var(--border-color); border-bottom: 2px solid var(--border-color); padding: 2rem 0;">
                        <div>
                            <p style="color: var(--text-light); font-size: 0.9rem;">Price</p>
                            <p style="font-size: 2rem; font-weight: 700;">${formatCurrency(product.price)}</p>
                        </div>
                        <div>
                            <p style="color: var(--text-light); font-size: 0.9rem;">Rating</p>
                            <p style="font-size: 1.5rem;">★ ${product.ratings || 4.5}</p>
                        </div>
                        <div>
                            <p style="color: var(--text-light); font-size: 0.9rem;">Stock</p>
                            <p style="font-size: 1.5rem; font-weight: 600; color: ${inventory.available_quantity > 0 ? 'var(--primary-black)' : 'red'};">
                                ${inventory.available_quantity > 0 ? inventory.available_quantity + ' in stock' : 'Out of stock'}
                            </p>
                        </div>
                    </div>

                    ${product.specifications ? `
                        <div style="margin-bottom: 2rem;">
                            <h3 style="margin-bottom: 1rem;">Specifications</h3>
                            <ul style="list-style: none;">
                                ${Object.entries(product.specifications).map(([key, value]) => `
                                    <li style="padding: 0.5rem 0; border-bottom: 1px solid var(--border-color);">
                                        <strong>${key.replace(/_/g, ' ')}:</strong> ${value}
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    ` : ''}

                    <div style="display: flex; gap: 1rem;">
                        <input type="number" id="quantity" min="1" value="1" max="${inventory.available_quantity || 1}" 
                            style="width: 80px; padding: 0.75rem; border: 2px solid var(--border-color); font-size: 1rem;">
                        <button onclick="addToCart(${product._id}, '${product.name}', ${product.price})" 
                            class="btn btn-primary" style="flex: 1;">
                            Add to Cart
                        </button>
                    </div>
                </div>
            `;
        }

        async function loadRelatedProducts(category, excludeId) {
            try {
                const response = await fetch(`${API_BASE_URL}/products?category=${category}&limit=4`);
                const result = await response.json();

                if (result.status === 'success') {
                    const related = result.data.products.filter(p => p._id !== excludeId).slice(0, 3);
                    const container = document.getElementById('related-products');
                    
                    container.innerHTML = related.map(product => `
                        <div class="product-card" onclick="window.location.href='/product.html?id=${product._id}'">
                            <div class="product-image">📦</div>
                            <div class="product-content">
                                <div class="product-name">${product.name}</div>
                                <div class="product-description">${product.description.substring(0, 60)}...</div>
                                <div class="product-footer">
                                    <div>
                                        <div class="product-price">${formatCurrency(product.price)}</div>
                                        <div class="product-rating">★ ${product.ratings || 4.5}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading related products:', error);
            }
        }

        function addToCart(productId, productName, price) {
            const quantity = parseInt(document.getElementById('quantity').value);
            const cart = new Cart();
            
            cart.addItem({
                _id: productId,
                name: productName,
                price: price,
                quantity: quantity
            });
            
            showAlert(`${productName} added to cart!`, 'success');
        }

        document.addEventListener('DOMContentLoaded', function() {
            updateNav();
            loadProductDetails();
        });
    </script>
</body>
</html>
