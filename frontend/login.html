<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Distribuy</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <a href="/">Distribuy</a>
            </div>
            <ul class="navbar-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/#products">Products</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 2rem;">Login to Your Account</h2>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="form-submit">Sign In</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem;">
                Don't have an account? <a href="/register.html" style="color: var(--primary-black); font-weight: 600;">Register here</a>
            </p>
        </div>
    </div>

    <script src="/assets/js/common.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const result = await apiCall('POST', '/users/login', { email, password });
                
                if (result.status === 'success') {
                    setToken(result.data.token);
                    setUserInfo({
                        user_id: result.data.user_id,
                        email: email,
                        is_admin: !!result.data.is_admin
                    });
                    
                    showAlert('Login successful!', 'success');
                    setTimeout(() => {
                        window.location.href = result.data.is_admin ? '/admin.html' : '/';
                    }, 1000);
                } else {
                    showAlert(result.error || 'Login failed', 'error');
                }
            } catch (error) {
                showAlert(error.message, 'error');
            }
        });
    </script>
</body>
</html>
